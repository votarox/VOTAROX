<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Votarox V4</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-2xl mx-auto p-4">

  <div class="bg-white p-4 rounded shadow mb-4 text-center">
    <h1 class="text-2xl font-bold text-purple-600">Votarox V4 🚀</h1>
    <div id="userBox" class="text-sm text-gray-500"></div>
  </div>

  <!-- AUTH -->
  <div class="bg-white p-4 rounded shadow mb-4">
    <input id="email" class="w-full p-2 border mb-2" placeholder="Email">
    <input id="password" type="password" class="w-full p-2 border mb-2" placeholder="Password">

    <div class="grid grid-cols-2 gap-2">
      <button onclick="signUp()" class="bg-green-500 text-white p-2 rounded">Sign Up</button>
      <button onclick="signIn()" class="bg-blue-500 text-white p-2 rounded">Sign In</button>
    </div>

    <button onclick="logout()" class="bg-red-500 text-white p-2 rounded w-full mt-2">
      Logout
    </button>
  </div>

  <!-- POST -->
  <div class="bg-white p-4 rounded shadow mb-4">
    <input id="question" class="w-full p-2 border mb-2" placeholder="Write post">

    <button onclick="addPoll()" class="w-full bg-purple-500 text-white p-2 rounded">
      Post
    </button>
  </div>

  <!-- FEED -->
  <div id="feed" class="space-y-3"></div>

</div>

<script>

// ================= SUPABASE =================

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= USER =================

async function getUser(){
  const { data } = await client.auth.getUser();
  return data.user;
}

async function updateUI(){
  const user = await getUser();
  document.getElementById("userBox").innerText =
    user ? user.email : "Guest";
}

// ================= AUTH =================

async function signUp(){
  await client.auth.signUp({
    email: email.value,
    password: password.value
  });

  alert("Check email");
}

async function signIn(){
  await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  updateUI();
  loadFeed();
}

async function logout(){
  await client.auth.signOut();
  updateUI();
  loadFeed();
}

// ================= POST =================

async function addPoll(){

  const user = await getUser();
  if(!user){
    alert("Login required");
    return;
  }

  const { error } = await client.from("polls").insert([{
    question: question.value,
    upvotes: 0,
    downvotes: 0,
    user_email: user.email
  }]);

  if(error){
    alert(error.message);
    return;
  }

  question.value = "";
  loadFeed();
}

// ================= LOAD =================

async function loadFeed(){

  const { data } = await client
    .from("polls")
    .select("*")
    .order("id",{ascending:false});

  render(data || []);
}

// ================= RENDER =================

function render(items){

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  items.forEach(p=>{

    feed.innerHTML += `
      <div class="bg-white p-4 rounded shadow">

        <div class="font-bold">${p.question}</div>
        <div class="text-xs text-gray-400">${p.user_email}</div>

        <div class="flex gap-2 mt-2">

          <button onclick="vote(${p.id}, 'up')" class="bg-green-500 text-white px-3 py-1 rounded">
            👍 ${p.upvotes}
          </button>

          <button onclick="vote(${p.id}, 'down')" class="bg-red-500 text-white px-3 py-1 rounded">
            👎 ${p.downvotes}
          </button>

        </div>

        <div class="mt-2">
          <button onclick="toggleComments(${p.id})" class="text-blue-500">
            💬 Comments
          </button>

          <div id="c-${p.id}" class="hidden mt-2">

            <input id="input-${p.id}" class="w-full p-2 border mb-2">

            <button onclick="addComment(${p.id})"
              class="bg-blue-500 text-white px-2 py-1 rounded">
              Send
            </button>

            <div id="list-${p.id}" class="mt-2"></div>

          </div>
        </div>

      </div>
    `;
  });
}

// ================= VOTE (FIXED SIMPLE) =================

async function vote(id, type){

  const user = await getUser();
  if(!user){
    alert("Login required");
    return;
  }

  // check simple
  const { data } = await client
    .from("votes")
    .select("*")
    .eq("poll_id", id)
    .eq("user_email", user.email);

  if(data.length > 0){
    alert("Already voted");
    return;
  }

  await client.from("votes").insert([{
    poll_id: id,
    user_email: user.email
  }]);

  const { data: poll } = await client
    .from("polls")
    .select("*")
    .eq("id", id)
    .single();

  const update = type === "up"
    ? { upvotes: poll.upvotes + 1 }
    : { downvotes: poll.downvotes + 1 };

  await client.from("polls").update(update).eq("id", id);

  loadFeed();
}

// ================= COMMENTS =================

function toggleComments(id){

  const box = document.getElementById(`c-${id}`);
  box.classList.toggle("hidden");

  if(!box.classList.contains("hidden")){
    loadComments(id);
  }
}

async function addComment(id){

  const user = await getUser();
  if(!user){
    alert("Login required");
    return;
  }

  const input = document.getElementById(`input-${id}`);

  await client.from("comments").insert([{
    poll_id: id,
    user_email: user.email,
    content: input.value
  }]);

  input.value = "";
  loadComments(id);
}

async function loadComments(id){

  const { data } = await client
    .from("comments")
    .select("*")
    .eq("poll_id", id)
    .order("id",{ascending:false});

  const list = document.getElementById(`list-${id}`);
  list.innerHTML = "";

  data.forEach(c=>{
    list.innerHTML += `
      <div class="text-sm bg-gray-100 p-1 rounded mb-1">
        <b>${c.user_email}</b>: ${c.content}
      </div>
    `;
  });
}

// ================= START =================

updateUI();
loadFeed();

</script>

</body>
</html>
