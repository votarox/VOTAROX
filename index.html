<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Votarox Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen">

<div class="max-w-3xl mx-auto p-4">

  <!-- HEADER -->
  <div class="bg-white p-4 rounded-xl shadow mb-4 text-center">
    <h1 class="text-3xl font-bold text-purple-600">Votarox Pro 🚀</h1>

    <div id="userBox" class="text-sm text-gray-500 mt-2"></div>

    <button onclick="loadProfile()" class="text-blue-600 text-sm mt-2 underline">
      My Profile
    </button>
  </div>

  <!-- AUTH -->
  <div class="bg-white p-4 rounded-xl shadow mb-4">
    <input id="email" class="p-2 border rounded w-full mb-2" placeholder="Email">
    <input id="password" type="password" class="p-2 border rounded w-full mb-2" placeholder="Password">

    <div class="grid grid-cols-2 gap-2">
      <button onclick="signUp()" class="bg-green-500 text-white p-2 rounded">Sign Up</button>
      <button onclick="signIn()" class="bg-blue-500 text-white p-2 rounded">Sign In</button>
    </div>

    <button onclick="logout()" class="bg-red-500 text-white p-2 rounded w-full mt-2">
      Logout
    </button>
  </div>

  <!-- CREATE POLL -->
  <div class="bg-white p-4 rounded-xl shadow mb-4">
    <input id="question" class="w-full p-2 border rounded mb-2" placeholder="Create poll...">

    <button onclick="addPoll()" class="w-full bg-purple-500 text-white p-2 rounded">
      Post Poll
    </button>
  </div>

  <!-- FEED -->
  <div id="feed" class="space-y-4"></div>

  <!-- PROFILE -->
  <div id="profile" class="hidden bg-white p-4 rounded-xl shadow mt-4"></div>

</div>

<script>

// ================= SUPABASE =================

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= USER =================

async function getUser(){
  const { data } = await client.auth.getUser();
  return data.user;
}

async function updateUserUI(){
  const user = await getUser();

  document.getElementById("userBox").innerHTML =
    user ? `Logged in as <b>${user.email}</b>` : "Guest mode";
}

// ================= AUTH =================

async function signUp(){
  await client.auth.signUp({
    email: email.value,
    password: password.value
  });
  alert("Check email");
}

async function signIn(){
  await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  updateUserUI();
  loadFeed();
}

async function logout(){
  await client.auth.signOut();
  updateUserUI();
  loadFeed();
}

// ================= CREATE POLL =================

async function addPoll(){

  const user = await getUser();
  if(!user) return alert("Login required");

  await client.from("polls").insert([{
    question: question.value,
    upvotes: 0,
    downvotes: 0,
    user_email: user.email
  }]);

  question.value = "";
  loadFeed();
}

// ================= LOAD FEED =================

async function loadFeed(){

  const { data } = await client
    .from("polls")
    .select("*")
    .order("id",{ascending:false});

  render(data || []);
}

function render(items){

  feed.innerHTML = "";

  items.forEach(p=>{

    feed.innerHTML += `
      <div class="bg-white p-4 rounded-xl shadow">

        <div class="font-bold">${p.question}</div>
        <div class="text-xs text-gray-400 mb-2">by ${p.user_email}</div>

        <div class="flex gap-2">

          <button onclick="vote(${p.id},'up')" class="bg-green-500 text-white px-3 py-1 rounded">
            👍 ${p.upvotes}
          </button>

          <button onclick="vote(${p.id},'down')" class="bg-red-500 text-white px-3 py-1 rounded">
            👎 ${p.downvotes}
          </button>

        </div>

      </div>
    `;
  });
}

// ================= VOTE =================

async function vote(id,type){

  const user = await getUser();
  if(!user) return alert("Login required");

  const { data } = await client
    .from("votes")
    .select("*")
    .eq("poll_id",id)
    .eq("user_email",user.email);

  if(data.length > 0){
    alert("Already voted");
    return;
  }

  await client.from("votes").insert([{
    poll_id:id,
    user_email:user.email
  }]);

  const { data:poll } = await client
    .from("polls")
    .select("*")
    .eq("id",id)
    .single();

  const update = type==="up"
    ? {upvotes:poll.upvotes+1}
    : {downvotes:poll.downvotes+1};

  await client.from("polls").update(update).eq("id",id);

  loadFeed();
}

// ================= REALTIME =================

client.channel('live-polls')
.on('postgres_changes',{
  event:'*',
  schema:'public',
  table:'polls'
},()=>{
  loadFeed();
})
.subscribe();

// ================= PROFILE =================

async function loadProfile(){

  const user = await getUser();
  if(!user) return alert("Login required");

  const { data: polls } = await client
    .from("polls")
    .select("*")
    .eq("user_email", user.email);

  const { data: votes } = await client
    .from("votes")
    .select("*")
    .eq("user_email", user.email);

  const profile = document.getElementById("profile");

  profile.classList.remove("hidden");

  profile.innerHTML = `
    <h2 class="text-xl font-bold mb-2">👤 Profile</h2>

    <p>Email: ${user.email}</p>
    <p>Posts: ${polls.length}</p>
    <p>Votes: ${votes.length}</p>

    <button onclick="closeProfile()" class="mt-3 bg-gray-200 px-3 py-1 rounded">
      Close
    </button>
  `;
}

function closeProfile(){
  document.getElementById("profile").classList.add("hidden");
}

// ================= START =================

const feed = document.getElementById("feed");

updateUserUI();
loadFeed();

</script>

</body>
</html>
