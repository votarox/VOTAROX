<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Votarox</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow">

  <h1 class="text-3xl font-bold mb-6 text-center">
    Votarox
  </h1>

  <!-- AUTH -->

  <input
    id="email"
    type="email"
    placeholder="Email"
    class="w-full border p-2 rounded mb-2"
  >

  <input
    id="password"
    type="password"
    placeholder="Password"
    class="w-full border p-2 rounded mb-2"
  >

  <button
    onclick="signUp()"
    class="w-full bg-green-500 text-white p-2 rounded mb-2"
  >
    Sign Up
  </button>

  <button
    onclick="signIn()"
    class="w-full bg-blue-500 text-white p-2 rounded mb-4"
  >
    Sign In
  </button>

  <!-- NEW POLL -->

  <input
    id="question"
    type="text"
    placeholder="Ask your question..."
    class="w-full border p-2 rounded mb-2"
  >

  <button
    onclick="addPoll()"
    class="w-full bg-purple-500 text-white p-2 rounded mb-4"
  >
    Post Poll
  </button>

  <!-- POLLS -->

  <div id="polls" class="space-y-4"></div>

</div>

<script>

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

// ================= SIGN UP =================

async function signUp() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Check your email!");
  }
}

// ================= SIGN IN =================

async function signIn() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Logged in ✔");
    loadPolls();
  }
}

// ================= ADD POLL =================

async function addPoll() {

  const input = document.getElementById("question");
  const q = input.value.trim();

  if (!q) return;

  const { error } = await client
    .from("polls")
    .insert([
      {
        question: q,
        upvotes: 0,
        downvotes: 0
      }
    ]);

  if (error) {
    alert(error.message);
  } else {
    input.value = "";
    loadPolls();
  }
}

// ================= LOAD POLLS =================

async function loadPolls() {

  const { data } = await client
    .from("polls")
    .select("*")
    .order("id", { ascending: false });

  render(data || []);
}

// ================= RENDER =================

function render(polls) {

  const container = document.getElementById("polls");

  container.innerHTML = "";

  polls.forEach(p => {

    container.innerHTML += `

      <div class="border rounded p-4">

        <h2 class="font-bold mb-3">
          ${p.question}
        </h2>

        <button
          onclick="vote(${p.id}, 'up')"
          class="bg-green-500 text-white px-3 py-1 rounded"
        >
          👍 ${p.upvotes}
        </button>

        <button
          onclick="vote(${p.id}, 'down')"
          class="bg-red-500 text-white px-3 py-1 rounded ml-2"
        >
          👎 ${p.downvotes}
        </button>

      </div>

    `;
  });
}

// ================= VOTE =================

async function vote(id, type) {

  const userData = await client.auth.getUser();
  const user = userData.data.user;

  if (!user) {
    alert("Please login first");
    return;
  }

  // CHECK EXISTING VOTE

  const { data: existingVotes } = await client
    .from("votes")
    .select("*")
    .eq("poll_id", id)
    .eq("user_email", user.email);

  if (existingVotes.length > 0) {
    alert("You already voted!");
    return;
  }

  // SAVE VOTE

  await client
    .from("votes")
    .insert([
      {
        poll_id: id,
        user_email: user.email
      }
    ]);

  // GET CURRENT POLL

  const { data } = await client
    .from("polls")
    .select("*")
    .eq("id", id)
    .single();

  // UPDATE COUNTS

  const updates = type === "up"
    ? { upvotes: data.upvotes + 1 }
    : { downvotes: data.downvotes + 1 };

  await client
    .from("polls")
    .update(updates)
    .eq("id", id);

  loadPolls();
}

// ================= START =================

loadPolls();

</script>

</body>
</html>
