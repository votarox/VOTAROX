<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votarox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10">

  <h1 class="text-3xl font-bold text-center">Votarox</h1>
  <p class="text-center text-gray-600">Ask, Vote, Decide</p>

  <!-- AUTH -->
  <div class="bg-white p-4 rounded shadow mt-4">

    <input id="email" class="w-full border p-2 mb-2" placeholder="Email">
    <input id="password" type="password" class="w-full border p-2 mb-2" placeholder="Password">

    <button onclick="signUp()" class="w-full bg-green-500 text-white p-2 mb-2">
      Sign Up
    </button>

    <button onclick="signIn()" class="w-full bg-blue-500 text-white p-2">
      Sign In
    </button>

    <p id="status" class="text-sm mt-2 text-gray-600"></p>

  </div>

  <!-- CREATE POLL -->
  <div class="bg-white p-4 rounded shadow mt-4">

    <input id="question" class="w-full border p-2" placeholder="Write your question">

    <button onclick="addPoll()" class="w-full mt-2 bg-black text-white p-2">
      Post Poll
    </button>

  </div>

  <!-- POLLS -->
  <div id="polls" class="mt-6 space-y-4"></div>

</div>

<script>

// ================= SUPABASE =================
const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= AUTH =================
async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({ email, password });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Check your email");
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("status").innerText = "Logged in ✔";
}

// ================= ADD POLL =================
async function addPoll() {
  const q = document.getElementById("question").value.trim();

  if (!q) return;

  const { error } = await client
    .from("polls")
    .insert([{ question: q, upvotes: 0, downvotes: 0 }]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("question").value = "";
  loadPolls();
}

// ================= LOAD POLLS =================
async function loadPolls() {
  const { data } = await client
    .from("polls")
    .select("*")
    .order("id", { ascending: false });

  render(data || []);
}

// ================= RENDER =================
function render(polls) {
  const box = document.getElementById("polls");
  box.innerHTML = "";

  polls.forEach(p => {
    box.innerHTML += `
      <div class="bg-white p-3 rounded shadow">
        <p class="font-bold">${p.question}</p>

        <button onclick="vote(${p.id}, 'up')">
          👍 ${p.upvotes}
        </button>

        <button onclick="vote(${p.id}, 'down')">
          👎 ${p.downvotes}
        </button>
      </div>
    `;
  });
}

// ================= VOTE =================
async function vote(id, type)const voted = localStorage.getItem("vote_" + id);

if (voted) {
  alert("You already voted");
  return;
} {

  const { data } = await client.auth.getUser();

  if (!data.user) {
    alert("You must login first");
    return;
  }

  let update = {};

  if (type === "up") update.upvotes = 1;
  if (type === "down") update.downvotes = 1;

  await client
    .from("polls")
    .update(update)
    .eq("id", id);

 localStorage.setItem("vote_" + id, "true"); loadPolls();
}

loadPolls();

</script>

</body>
</html>
