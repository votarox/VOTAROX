<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Votarox Stable</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-2xl mx-auto p-4">

  <!-- HEADER -->
  <div class="bg-white p-4 rounded shadow mb-4 text-center">
    <h1 class="text-3xl font-bold text-purple-600">
      Votarox 🚀
    </h1>

    <div id="userBox" class="text-sm text-gray-500 mt-1">
      Guest
    </div>
  </div>

  <!-- AUTH -->
  <div class="bg-white p-4 rounded shadow mb-4">

    <input id="email"
      class="w-full p-2 border mb-2 rounded"
      placeholder="Email">

    <input id="password"
      type="password"
      class="w-full p-2 border mb-2 rounded"
      placeholder="Password">

    <div class="grid grid-cols-2 gap-2">

      <button onclick="signUp()"
        class="bg-green-500 text-white p-2 rounded">
        Sign Up
      </button>

      <button onclick="signIn()"
        class="bg-blue-500 text-white p-2 rounded">
        Sign In
      </button>

    </div>

    <button onclick="logout()"
      class="bg-red-500 text-white p-2 rounded w-full mt-2">
      Logout
    </button>

  </div>

  <!-- CREATE POST -->
  <div class="bg-white p-4 rounded shadow mb-4">

    <input id="question"
      class="w-full p-2 border rounded mb-2"
      placeholder="Write post...">

    <button onclick="addPoll()"
      class="w-full bg-purple-500 text-white p-2 rounded">
      Post
    </button>

  </div>

  <!-- FEED -->
  <div id="feed" class="space-y-3"></div>

</div>

<script>

// ================= SUPABASE =================

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

// ================= USER =================

async function getUser(){

  const { data } = await client.auth.getUser();

  return data.user;
}

async function updateUI(){

  const user = await getUser();

  document.getElementById("userBox").innerText =
    user ? user.email : "Guest";
}

// ================= AUTH =================

async function signUp(){

  await client.auth.signUp({
    email: email.value,
    password: password.value
  });

  alert("Check email");
}

async function signIn(){

  await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  updateUI();
  loadFeed();
}

async function logout(){

  await client.auth.signOut();

  updateUI();
  loadFeed();
}

// ================= CREATE POST =================

async function addPoll(){

  const user = await getUser();

  if(!user){
    alert("Login required");
    return;
  }

  const { error } = await client
    .from("polls")
    .insert([{
      question: question.value,
      upvotes: 0,
      downvotes: 0,
      user_email: user.email
    }]);

  if(error){
    alert(error.message);
    return;
  }

  question.value = "";

  loadFeed();
}

// ================= LOAD POSTS =================

async function loadFeed(){

  const { data } = await client
    .from("polls")
    .select("*")
    .order("id",{ascending:false});

  render(data || []);
}

// ================= RENDER =================

function render(items){

  const feed = document.getElementById("feed");

  feed.innerHTML = "";

  items.forEach(p=>{

    feed.innerHTML += `

      <div class="bg-white p-4 rounded shadow">

        <div class="font-bold text-lg">
          ${p.question}
        </div>

        <div class="text-xs text-gray-400 mb-2">
          ${p.user_email}
        </div>

        <div class="flex gap-2">

          <button onclick="vote(${p.id}, 'up')"
            class="bg-green-500 text-white px-3 py-1 rounded">
            👍 ${p.upvotes || 0}
          </button>

          <button onclick="vote(${p.id}, 'down')"
            class="bg-red-500 text-white px-3 py-1 rounded">
            👎 ${p.downvotes || 0}
          </button>

        </div>

        <!-- COMMENTS -->

        <div class="mt-3">

          <button onclick="toggleComments(${p.id})"
            class="text-blue-500 text-sm">
            💬 Comments
          </button>

          <div id="comments-${p.id}"
            class="hidden mt-2">

            <input id="input-${p.id}"
              class="w-full p-2 border rounded mb-2"
              placeholder="Write comment">

            <button onclick="addComment(${p.id})"
              class="bg-blue-500 text-white px-2 py-1 rounded">
              Send
            </button>

            <div id="list-${p.id}"
              class="mt-2 space-y-1"></div>

          </div>

        </div>

      </div>

    `;
  });
}

// ================= SIMPLE VOTE =================

async function vote(id, type){

  const user = await getUser();

  if(!user){
    alert("Login required");
    return;
  }

  const { data: poll } = await client
    .from("polls")
    .select("*")
    .eq("id", id)
    .single();

  let updateData = {};

  if(type === "up"){

    updateData = {
      upvotes: (poll.upvotes || 0) + 1
    };

  } else {

    updateData = {
      downvotes: (poll.downvotes || 0) + 1
    };
  }

  await client
    .from("polls")
    .update(updateData)
    .eq("id", id);

  loadFeed();
}

// ================= COMMENTS =================

function toggleComments(id){

  const box =
    document.getElementById(`comments-${id}`);

  box.classList.toggle("hidden");

  if(!box.classList.contains("hidden")){

    loadComments(id);
  }
}

async function addComment(id){

  const user = await getUser();

  if(!user){
    alert("Login required");
    return;
  }

  const input =
    document.getElementById(`input-${id}`);

  const { error } = await client
    .from("comments")
    .insert([{
      poll_id: id,
      user_email: user.email,
      content: input.value
    }]);

  if(error){
    alert(error.message);
    return;
  }

  input.value = "";

  loadComments(id);
}

async function loadComments(id){

  const { data } = await client
    .from("comments")
    .select("*")
    .eq("poll_id", id)
    .order("id",{ascending:false});

  const list =
    document.getElementById(`list-${id}`);

  list.innerHTML = "";

  data.forEach(c=>{

    list.innerHTML += `
      <div class="bg-gray-100 p-2 rounded text-sm">
        <b>${c.user_email}</b>: ${c.content}
      </div>
    `;
  });
}

// ================= START =================

updateUI();
loadFeed();

</script>

</body>
</html>
