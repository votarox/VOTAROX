<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votarox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-6">

  <div class="max-w-xl mx-auto bg-white p-6 rounded shadow">

    <h1 class="text-2xl font-bold mb-4">Votarox</h1>

    <!-- Auth -->
    <input id="email" class="w-full p-2 border mb-2" placeholder="Email">
    <input id="password" type="password" class="w-full p-2 border mb-2" placeholder="Password">

    <button onclick="signUp()" class="w-full bg-green-500 text-white p-2 mb-2">
      Sign Up
    </button>

    <button onclick="signIn()" class="w-full bg-blue-500 text-white p-2 mb-4">
      Sign In
    </button>

    <!-- Poll -->
    <input id="question" class="w-full p-2 border mb-2" placeholder="Ask a question">

    <button onclick="addPoll()" class="w-full bg-purple-500 text-white p-2 mb-4">
      Post Poll
    </button>

    <div id="polls" class="space-y-4"></div>

  </div>

<script>
// ================= SUPABASE =================

// ✳️ ضع الرابط هنا
const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";

// ✳️ ضع المفتاح هنا
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= AUTH =================

async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({
    email,
    password
  });

  if (error) alert(error.message);
  else alert("Check your email for confirmation!");
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) alert(error.message);
  else {
    alert("Logged in ✔");
    loadPolls();
  }
}

// ================= POLLS =================

async function addPoll() {
  const input = document.getElementById("question");
  const q = input.value.trim();

  if (!q) return;

  const { error } = await client
    .from("polls")
    .insert([{ question: q, upvotes: 0, downvotes: 0 }]);

  if (error) {
    alert(error.message);
  } else {
    input.value = "";
    loadPolls();
  }
}

async function loadPolls() {
  const { data } = await client
    .from("polls")
    .select("*")
    .order("id", { ascending: false });

  render(data || []);
}

function render(polls) {
  const container = document.getElementById("polls");
  container.innerHTML = "";

  polls.forEach(p => {
    container.innerHTML += `
      <div class="p-3 border rounded">
        <p class="font-bold">${p.question}</p>

        <button onclick="vote(${p.id}, 'up')" class="text-green-600">
          👍 ${p.upvotes}
        </button>

        <button onclick="vote(${p.id}, 'down')" class="text-red-600 ml-2">
          👎 ${p.downvotes}
        </button>
      </div>
    `;
  });
}

async function vote(id, type) {

  const userData = await client.auth.getUser();
  const user = userData.data.user;

  if (!user) {
    alert("Please login first");
    return;
  }

  // check if already voted
  const { data: existingVotes } = await client
    .from("votes")
    .select("*")
    .eq("poll_id", id)
    .eq("user_email", user.email);

  if (existingVotes.length > 0) {
    alert("You already voted!");
    return;
  }

  // save vote
  await client.from("votes").insert([
    {
      poll_id: id,
      user_email: user.email
    }
  ]);

  // get current poll
  const { data } = await client
    .from("polls")
    .select("*")
    .eq("id", id)
    .single();

  // update vote count
  const updates = type === "up"
    ? { upvotes: data.upvotes + 1 }
    : { downvotes: data.downvotes + 1 };

  await client
    .from("polls")
    .update(updates)
    .eq("id", id);

  loadPolls();
}
  const { data } = await client
    .from("polls")
    .select("*")
    .eq("id", id)
    .single();

  if (!data) return;

  const updates = type === "up"
    ? { upvotes: data.upvotes + 1 }
    : { downvotes: data.downvotes + 1 };

  await client.from("polls").update(updates).eq("id", id);

  loadPolls();
}

// ================= START =================
loadPolls();

</script>

</body>
</html>
