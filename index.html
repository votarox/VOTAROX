<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votarox</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen p-6">

<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6">

  <h1 class="text-3xl font-bold text-center mb-6 text-purple-600">
    Votarox 🗳️
  </h1>

  <!-- USER -->
  <div id="userBox" class="text-sm text-gray-600 mb-4"></div>

  <!-- AUTH -->
  <div class="grid gap-2 mb-4">
    <input id="email" class="p-2 border rounded" placeholder="Email">
    <input id="password" type="password" class="p-2 border rounded" placeholder="Password">

    <div class="grid grid-cols-2 gap-2">
      <button onclick="signUp()" class="bg-green-500 text-white p-2 rounded hover:bg-green-600">
        Sign Up
      </button>

      <button onclick="signIn()" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
        Sign In
      </button>
    </div>

    <button onclick="logout()" class="bg-red-500 text-white p-2 rounded hover:bg-red-600">
      Logout
    </button>
  </div>

  <!-- CREATE POLL -->
  <div class="mb-6">
    <input id="question" class="w-full p-2 border rounded mb-2" placeholder="Ask a question...">

    <button onclick="addPoll()" class="w-full bg-purple-500 text-white p-2 rounded hover:bg-purple-600">
      Post Poll
    </button>
  </div>

  <!-- POLLS -->
  <div id="polls" class="space-y-4"></div>

</div>

<script>

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= USER =================

async function updateUserUI() {
  const { data } = await client.auth.getUser();
  const user = data.user;

  document.getElementById("userBox").innerText =
    user ? `Logged in as: ${user.email}` : "Not logged in";
}

// ================= AUTH =================

async function signUp() {
  const email = email.value;
  const password = password.value;

  const { error } = await client.auth.signUp({ email, password });

  if (error) alert(error.message);
  else alert("Check your email!");
}

async function signIn() {
  const { error } = await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) alert(error.message);
  else {
    updateUserUI();
    loadPolls();
  }
}

async function logout() {
  await client.auth.signOut();
  updateUserUI();
  loadPolls();
}

// ================= POLLS =================

async function addPoll() {
  if (!question.value) return;

  await client.from("polls").insert([
    {
      question: question.value,
      upvotes: 0,
      downvotes: 0
    }
  ]);

  question.value = "";
  loadPolls();
}

async function loadPolls() {

  const { data } = await client
    .from("polls")
    .select("*")
    .order("id", { ascending: false });

  render(data || []);
}

function render(polls) {

  pollsContainer.innerHTML = "";

  polls.forEach(p => {

    pollsContainer.innerHTML += `
      <div class="bg-gray-50 border rounded-xl p-4 shadow-sm">

        <h2 class="text-lg font-semibold mb-3">
          ${p.question}
        </h2>

        <div class="flex gap-2">

          <button onclick="vote(${p.id}, 'up')"
            class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">
            👍 ${p.upvotes}
          </button>

          <button onclick="vote(${p.id}, 'down')"
            class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
            👎 ${p.downvotes}
          </button>

        </div>

      </div>
    `;
  });
}

// ================= VOTE =================

async function vote(id, type) {

  const { data } = await client.auth.getUser();
  const user = data.user;

  if (!user) return alert("Login first");

  const { data: existing } = await client
    .from("votes")
    .select("*")
    .eq("poll_id", id)
    .eq("user_email", user.email);

  if (existing.length > 0) {
    return alert("You already voted!");
  }

  await client.from("votes").insert([
    {
      poll_id: id,
      user_email: user.email
    }
  ]);

  const { data: poll } = await client
    .from("polls")
    .select("*")
    .eq("id", id)
    .single();

  const update = type === "up"
    ? { upvotes: poll.upvotes + 1 }
    : { downvotes: poll.downvotes + 1 };

  await client.from("polls")
    .update(update)
    .eq("id", id);

  loadPolls();
}

// ================= START =================

const pollsContainer = document.getElementById("polls");

updateUserUI();
loadPolls();

</script>

</body>
</html>
