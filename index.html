<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votarox</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <div class="max-w-2xl mx-auto mt-20 text-center">

    <h1 class="text-4xl font-bold">Votarox</h1>
    <p class="text-gray-600 mt-2">Ask. Vote. Decide.</p>

    <div class="mt-10 bg-white p-6 rounded-xl shadow">

      <h2 class="text-xl font-semibold mb-4">Create a poll</h2>

      <input class="w-full p-2 border rounded mb-3" placeholder="Your question...">

      <button class="w-full bg-black text-white p-2 rounded">
        Publish Poll
      </button>

    </div>

  </div>

</body>
</html>
