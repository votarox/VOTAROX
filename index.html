<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votarox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10">

  <h1 class="text-3xl font-bold text-center">Votarox</h1>
  <p class="text-center text-gray-600">Ask, Vote, Decide</p>

  <div class="mt-6 bg-white p-4 rounded shadow">
    <input id="question" class="w-full border p-2" placeholder="Your question...">
    <button onclick="addPoll()" class="w-full mt-2 bg-black text-white p-2">
      Post Poll
    </button>
  </div>

  <div id="polls" class="mt-6 space-y-4"></div>

</div>

<script>

// ====== SUPABASE ======
const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ====== LOAD POLLS ======
async function loadPolls() {
  const { data, error } = await client
    .from("polls")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  render(data || []);
}

// ====== ADD POLL ======
async function addPoll() {
  const input = document.getElementById("question");
  const q = input.value.trim();

  if (!q) {
    alert("اكتب سؤال أولاً");
    return;
  }

  const { error } = await client
    .from("polls")
    .insert([
      { question: q, upvotes: 0, downvotes: 0 }
    ]);

  if (error) {
    alert("خطأ: " + error.message);
    return;
  }

  input.value = "";
  loadPolls();
}

// ====== VOTE (prevent double vote) ======
async function vote(id, type, up, down) {

  const key = "voted_" + id;

  if (localStorage.getItem(key)) {
    alert("You already voted");
    return;
  }

  if (type === "up") up++;
  if (type === "down") down++;

  const { error } = await client
    .from("polls")
    .update({
      upvotes: up,
      downvotes: down
    })
    .eq("id", id);

  if (error) {
    alert("Error voting");
    return;
  }

  localStorage.setItem(key, "true");

  loadPolls();
}

// ====== RENDER ======
function render(polls) {
  const container = document.getElementById("polls");
  container.innerHTML = "";

  polls.forEach(p => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded shadow">

        <p class="font-bold">${p.question}</p>

        <div class="flex gap-3 mt-2">
          <button onclick="vote(${p.id}, 'up', ${p.upvotes}, ${p.downvotes})">
            👍 ${p.upvotes}
          </button>

          <button onclick="vote(${p.id}, 'down', ${p.upvotes}, ${p.downvotes})">
            👎 ${p.downvotes}
          </button>
        </div>

        <p class="text-xs text-gray-500 mt-2">
          ${p.created_at ? new Date(p.created_at).toLocaleString() : ""}
        </p>

      </div>
    `;
  });
}

// ====== START ======
loadPolls();

</script>

</body>
</html>
