<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Votarox PRO V1</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:#6d28d9;
  border-radius:20px;
}

body{
  background:#0f172a;
}

.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.08);
}

</style>

</head>

<body class="text-white">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->

  <aside class="hidden md:flex w-64 glass flex-col p-6 fixed h-full">

    <div class="text-3xl font-black text-purple-400 mb-10">
      Votarox 🚀
    </div>

    <nav class="space-y-3">

      <button class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition">
        🏠 Home
      </button>

      <button class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition">
        🔥 Trending
      </button>

      <button class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition">
        🔔 Notifications
      </button>

      <button class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition">
        👤 Profile
      </button>

      <button class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition">
        ⚙️ Settings
      </button>

    </nav>

  </aside>

  <!-- MAIN -->

  <main class="flex-1 md:ml-64 p-4 max-w-3xl mx-auto w-full">

    <!-- TOPBAR -->

    <div class="glass rounded-2xl p-4 mb-5 sticky top-4 z-50">

      <div class="flex items-center justify-between gap-3">

        <div>
          <div class="text-2xl font-black text-purple-400">
            Votarox
          </div>

          <div id="userBox" class="text-xs text-gray-400 mt-1">
            Guest
          </div>
        </div>

        <div class="flex gap-2">

          <button
            onclick="toggleTheme()"
            class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition">
            🌙
          </button>

          <button
            onclick="logout()"
            class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-xl transition">
            Logout
          </button>

        </div>

      </div>

    </div>

    <!-- AUTH -->

    <div class="glass rounded-2xl p-5 mb-5">

      <div class="text-lg font-bold mb-4">
        Login / Register
      </div>

      <input
        id="email"
        class="w-full p-3 rounded-xl bg-white/10 border border-white/10 mb-3 outline-none"
        placeholder="Email">

      <input
        id="password"
        type="password"
        class="w-full p-3 rounded-xl bg-white/10 border border-white/10 mb-3 outline-none"
        placeholder="Password">

      <div class="grid grid-cols-2 gap-3">

        <button
          onclick="signUp()"
          class="bg-green-500 hover:bg-green-600 p-3 rounded-xl font-bold transition">

          Sign Up

        </button>

        <button
          onclick="signIn()"
          class="bg-purple-500 hover:bg-purple-600 p-3 rounded-xl font-bold transition">

          Sign In

        </button>

      </div>

    </div>

    <!-- CREATE POST -->

    <div class="glass rounded-2xl p-5 mb-5">

      <textarea
        id="question"
        rows="3"
        class="w-full p-4 rounded-2xl bg-white/10 border border-white/10 outline-none resize-none"
        placeholder="What's happening today?"></textarea>

      <button
        onclick="addPoll()"
        class="mt-3 bg-purple-500 hover:bg-purple-600 px-6 py-3 rounded-2xl font-bold transition">

        Post 🚀

      </button>

    </div>

    <!-- FEED -->

    <div id="feed" class="space-y-4"></div>

  </main>

</div>

<script>

// ================= SUPABASE =================

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

// ================= USER =================

async function getUser(){

  const { data } =
    await client.auth.getUser();

  return data.user;
}

async function updateUI(){

  const user = await getUser();

  document.getElementById("userBox")
    .innerText = user
    ? user.email
    : "Guest";
}

// ================= AUTH =================

async function signUp(){

  await client.auth.signUp({
    email: email.value,
    password: password.value
  });

  alert("Check email");
}

async function signIn(){

  await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  updateUI();
  loadFeed();
}

async function logout(){

  await client.auth.signOut();

  updateUI();
  loadFeed();
}

// ================= CREATE POST =================

async function addPoll(){

  const user = await getUser();

  if(!user){
    alert("Login required");
    return;
  }

  const { error } =
    await client
    .from("polls")
    .insert([{
      question: question.value,
      upvotes: 0,
      downvotes: 0,
      user_email: user.email
    }]);

  if(error){
    alert(error.message);
    return;
  }

  question.value = "";

  loadFeed();
}

// ================= LOAD POSTS =================

async function loadFeed(){

  const { data } =
    await client
    .from("polls")
    .select("*")
    .order("id",{ascending:false});

  render(data || []);
}

// ================= RENDER =================

function render(items){

  const feed =
    document.getElementById("feed");

  feed.innerHTML = "";

  items.forEach(p=>{

    feed.innerHTML += `

      <div
        class="glass rounded-3xl p-5 hover:scale-[1.01] transition duration-300">

        <!-- USER -->

        <div class="flex items-center gap-3 mb-4">

          <div class="w-12 h-12 rounded-full bg-purple-500 flex items-center justify-center text-xl font-bold">
            ${p.user_email.charAt(0).toUpperCase()}
          </div>

          <div>

            <div class="font-bold">
              ${p.user_email}
            </div>

            <div class="text-xs text-gray-400">
              Votarox User
            </div>

          </div>

        </div>

        <!-- CONTENT -->

        <div class="text-lg mb-4 leading-relaxed">
          ${p.question}
        </div>

        <!-- ACTIONS -->

        <div class="flex gap-3 mb-4">

          <button
            onclick="vote(${p.id}, 'up')"
            class="bg-green-500/20 hover:bg-green-500 px-4 py-2 rounded-xl transition">

            👍 ${p.upvotes || 0}

          </button>

          <button
            onclick="vote(${p.id}, 'down')"
            class="bg-red-500/20 hover:bg-red-500 px-4 py-2 rounded-xl transition">

            👎 ${p.downvotes || 0}

          </button>

          <button
            onclick="toggleComments(${p.id})"
            class="bg-blue-500/20 hover:bg-blue-500 px-4 py-2 rounded-xl transition">

            💬 Comments

          </button>

        </div>

        <!-- COMMENTS -->

        <div
          id="comments-${p.id}"
          class="hidden">

          <input
            id="input-${p.id}"
            class="w-full p-3 rounded-xl bg-white/10 border border-white/10 mb-2 outline-none"
            placeholder="Write comment">

          <button
            onclick="addComment(${p.id})"
            class="bg-purple-500 hover:bg-purple-600 px-4 py-2 rounded-xl transition">

            Send

          </button>

          <div
            id="list-${p.id}"
            class="mt-3 space-y-2"></div>

        </div>

      </div>

    `;
  });
}

// ================= VOTE =================

async function vote(id, type){

  const user = await getUser();

  if(!user){
    alert("Login required");
    return;
  }

  const voteKey =
    `vote_${id}_${user.email}`;

  if(localStorage.getItem(voteKey)){

    alert("You already voted");

    return;
  }

  const { data: poll } =
    await client
    .from("polls")
    .select("*")
    .eq("id", id)
    .single();

  let updateData = {};

  if(type === "up"){

    updateData = {
      upvotes: (poll.upvotes || 0) + 1
    };

  } else {

    updateData = {
      downvotes: (poll.downvotes || 0) + 1
    };
  }

  const { error } =
    await client
    .from("polls")
    .update(updateData)
    .eq("id", id);

  if(error){

    alert(error.message);

    return;
  }

  localStorage.setItem(voteKey, "true");

  loadFeed();
}

// ================= COMMENTS =================

function toggleComments(id){

  const box =
    document.getElementById(
      `comments-${id}`
    );

  box.classList.toggle("hidden");

  if(!box.classList.contains("hidden")){

    loadComments(id);
  }
}

async function addComment(id){

  const user = await getUser();

  if(!user){
    alert("Login required");
    return;
  }

  const input =
    document.getElementById(
      `input-${id}`
    );

  const { error } =
    await client
    .from("comments")
    .insert([{
      poll_id: id,
      user_email: user.email,
      content: input.value
    }]);

  if(error){

    alert(error.message);

    return;
  }

  input.value = "";

  loadComments(id);
}

async function loadComments(id){

  const { data } =
    await client
    .from("comments")
    .select("*")
    .eq("poll_id", id)
    .order("id",{ascending:false});

  const list =
    document.getElementById(
      `list-${id}`
    );

  list.innerHTML = "";

  data.forEach(c=>{

    list.innerHTML += `

      <div class="bg-white/10 rounded-xl p-3 text-sm">

        <span class="font-bold">
          ${c.user_email}
        </span>

        : ${c.content}

      </div>

    `;
  });
}

// ================= THEME =================

function toggleTheme(){

  document.body.classList.toggle("bg-white");
}

// ================= START =================

updateUI();

loadFeed();

</script>

</body>
</html>
