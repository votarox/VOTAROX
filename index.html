<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Votarox V2 Fixed</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-2xl mx-auto p-4">

  <!-- HEADER -->
  <div class="bg-white p-4 rounded shadow mb-4 text-center">
    <h1 class="text-3xl font-bold text-purple-600">Votarox V2 🚀</h1>
    <div id="userBox" class="text-sm text-gray-500 mt-1"></div>
  </div>

  <!-- AUTH -->
  <div class="bg-white p-4 rounded shadow mb-4">
    <input id="email" class="w-full p-2 border mb-2" placeholder="Email">
    <input id="password" type="password" class="w-full p-2 border mb-2" placeholder="Password">

    <div class="grid grid-cols-2 gap-2">
      <button onclick="signUp()" class="bg-green-500 text-white p-2 rounded">Sign Up</button>
      <button onclick="signIn()" class="bg-blue-500 text-white p-2 rounded">Sign In</button>
    </div>
  </div>

  <!-- CREATE POST -->
  <div class="bg-white p-4 shadow rounded mb-4">
    <input id="question" class="w-full p-2 border mb-2" placeholder="Write post...">

    <button onclick="addPoll()" class="w-full bg-purple-500 text-white p-2 rounded">
      Post
    </button>
  </div>

  <!-- FEED -->
  <div id="feed" class="space-y-3"></div>

</div>

<script>

// ================= SUPABASE =================

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= USER =================

async function getUser(){
  const { data } = await client.auth.getUser();
  return data.user;
}

async function updateUI(){
  const user = await getUser();
  document.getElementById("userBox").innerHTML =
    user ? `Logged in: <b>${user.email}</b>` : "Guest";
}

// ================= AUTH =================

async function signUp(){
  const { data, error } = await client.auth.signUp({
    email: email.value,
    password: password.value
  });

  console.log("SIGNUP:", data, error);
  alert("Check email");
}

async function signIn(){
  const { data, error } = await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  console.log("LOGIN:", data, error);

  updateUI();
  loadFeed();
}

// ================= ADD POST =================

async function addPoll(){

  const user = await getUser();

  console.log("USER:", user);
  console.log("TEXT:", question.value);

  if(!user){
    alert("Login required");
    return;
  }

  const { data, error } = await client
    .from("polls")
    .insert([{
      question: question.value,
      upvotes: 0,
      downvotes: 0,
      user_email: user.email
    }])
    .select();

  console.log("INSERT RESULT:", data, error);

  if(error){
    alert("Error inserting: " + error.message);
    return;
  }

  question.value = "";
  loadFeed();
}

// ================= LOAD FEED =================

async function loadFeed(){

  const { data, error } = await client
    .from("polls")
    .select("*")
    .order("id",{ascending:false});

  console.log("FEED DATA:", data, error);

  if(error){
    feed.innerHTML = "Error loading data";
    return;
  }

  render(data || []);
}

// ================= RENDER =================

function render(items){

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  items.forEach(p=>{

    feed.innerHTML += `
      <div class="bg-white p-4 rounded shadow">

        <div class="font-bold">${p.question}</div>
        <div class="text-xs text-gray-400">${p.user_email}</div>

        <div class="text-sm mt-2">
          👍 ${p.upvotes} | 👎 ${p.downvotes}
        </div>

      </div>
    `;
  });
}

// ================= START =================

updateUI();
loadFeed();

</script>

</body>
</html>
