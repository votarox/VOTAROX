<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votarox</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-50">

  <div class="max-w-2xl mx-auto mt-20 text-center">

    <h1 class="text-4xl font-bold">Votarox</h1>
    <p class="text-gray-600 mt-2">Ask, Vote, Decide.</p>

    <div class="mt-10 bg-white p-6 rounded-xl shadow">

      <input id="question" class="w-full p-2 border rounded mb-3" placeholder="Your question...">

      <button onclick="addPoll()" class="w-full bg-black text-white p-2 rounded">
        Post a poll
      </button>

    </div>

    <div id="polls" class="mt-10 space-y-4"></div>

  </div>

<script>
const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// تحميل البيانات
async function loadPolls() {
  const { data } = await client.from("polls").select("*").order("id", { ascending: false });
  render(data || []);
}

// إضافة تصويت
async function addPoll() {
  const q = document.getElementById("question").value;
  if (!q) return;

  await client.from("polls").insert([
    { question: q, upvotes: 0, downvotes: 0 }
  ]);

  document.getElementById("question").value = "";
  loadPolls();
}

// تصويت
  async function vote(id, type, up, down) {

  const votedKey = "voted_" + id;

  if (localStorage.getItem(votedKey)) {
    alert("You already voted.");
    return;
  }

  if (type === "up") up++;
  if (type === "down") down++;

  await client.from("polls").update({
    upvotes: up,
    downvotes: down
  }).eq("id", id);

  localStorage.setItem(votedKey, "true");

  loadPolls();
}
  if (type === "up") up++;
  if (type === "down") down++;

  await client.from("polls").update({
    upvotes: up,
    downvotes: down
  }).eq("id", id);

  loadPolls();
}

// عرض البيانات
function render(polls) {
  const container = document.getElementById("polls");
  container.innerHTML = "";

  polls.forEach(p => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded shadow text-left">
        <p class="font-semibold">${p.question}</p>
<p class="text-sm text-gray-500">${new Date(p.created_at).toLocaleString()}</p>
        <div class="mt-3 flex gap-3">
          <button onclick="vote(${p.id}, 'up', ${p.upvotes}, ${p.downvotes})"
            class="px-3 py-1 bg-green-500 text-white rounded">
            👍 ${p.upvotes}
          </button>

          <button onclick="vote(${p.id}, 'down', ${p.upvotes}, ${p.downvotes})"
            class="px-3 py-1 bg-red-500 text-white rounded">
            👎 ${p.downvotes}
          </button>
        </div>
      </div>
    `;
  });
}

loadPolls();
</script>

</body>
</html>
