<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votarox</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

  <div class="max-w-2xl mx-auto mt-20 text-center">

    <h1 class="text-4xl font-bold">Votarox</h1>
    <p class="text-gray-600 mt-2">Ask, Vote, Decide.</p>

    <div class="mt-10 bg-white p-6 rounded-xl shadow">

      <h2 class="text-xl font-semibold mb-4">Create a poll</h2>

      <input id="question" class="w-full p-2 border rounded mb-3" placeholder="Your question...">

      <button onclick="addPoll()" class="w-full bg-black text-white p-2 rounded">
        Post a poll
      </button>

    </div>

    <div id="polls" class="mt-10 space-y-4"></div>

  </div>

<script>
let polls = JSON.parse(localStorage.getItem("polls")) || [];

// تحميل البيانات عند فتح الصفحة
window.onload = function() {
  renderPolls();
};

function addPoll() {
  const q = document.getElementById("question").value;
  if (!q) return;

  const newPoll = {
    text: q,
    votes: { up: 0, down: 0 }
  };

  polls.unshift(newPoll);
  saveAndRender();

  document.getElementById("question").value = "";
}

function vote(index, type) {
  if (type === "up") polls[index].votes.up++;
  if (type === "down") polls[index].votes.down++;

  saveAndRender();
}

function saveAndRender() {
  localStorage.setItem("polls", JSON.stringify(polls));
  renderPolls();
}

function renderPolls() {
  const container = document.getElementById("polls");
  container.innerHTML = "";

  polls.forEach((p, index) => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded shadow text-left">
        <p class="font-semibold">${p.text}</p>

        <div class="mt-3 flex gap-3">
          <button onclick="vote(${index}, 'up')" class="px-3 py-1 bg-green-500 text-white rounded">
            👍 ${p.votes.up}
          </button>

          <button onclick="vote(${index}, 'down')" class="px-3 py-1 bg-red-500 text-white rounded">
            👎 ${p.votes.down}
          </button>
        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
