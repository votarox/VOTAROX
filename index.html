<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Votarox Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 via-gray-100 to-slate-200 min-h-screen text-gray-800">

<div class="max-w-3xl mx-auto p-4">

  <!-- HEADER -->
  <div class="bg-white p-5 rounded-2xl shadow mb-5 text-center border">

    <h1 class="text-4xl font-extrabold text-purple-600">
      Votarox 🚀
    </h1>

    <div id="userBox" class="text-sm text-gray-500 mt-2"></div>

    <div class="mt-3 flex justify-center gap-4">
      <button onclick="loadProfile()" class="text-blue-600 text-sm font-medium hover:text-blue-800">
        👤 Profile
      </button>

      <button onclick="loadNotifications()" class="text-yellow-600 text-sm font-medium hover:text-yellow-700">
        🔔 Notifications
      </button>
    </div>

  </div>

  <!-- AUTH -->
  <div class="bg-white p-5 rounded-2xl shadow mb-5 border">

    <input id="email" class="w-full p-3 border rounded-xl mb-2" placeholder="Email">
    <input id="password" type="password" class="w-full p-3 border rounded-xl mb-3" placeholder="Password">

    <div class="grid grid-cols-2 gap-2">
      <button onclick="signUp()" class="bg-green-500 hover:bg-green-600 text-white p-3 rounded-xl">
        Sign Up
      </button>

      <button onclick="signIn()" class="bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-xl">
        Sign In
      </button>
    </div>

    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white p-3 rounded-xl w-full mt-3">
      Logout
    </button>

  </div>

  <!-- CREATE POLL -->
  <div class="bg-white p-5 rounded-2xl shadow mb-5 border">

    <input id="question"
      class="w-full p-3 border rounded-xl mb-3"
      placeholder="✨ What's your poll?" />

    <button onclick="addPoll()"
      class="w-full bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-xl font-semibold">
      Post Poll
    </button>

  </div>

  <!-- FEED -->
  <div id="feed" class="space-y-4"></div>

  <!-- PROFILE -->
  <div id="profile" class="hidden bg-white p-5 rounded-2xl shadow mt-5 border"></div>

</div>

<script>

// ================= SUPABASE =================

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= USER =================

async function getUser(){
  const { data } = await client.auth.getUser();
  return data.user;
}

async function updateUserUI(){
  const user = await getUser();
  document.getElementById("userBox").innerHTML =
    user ? `Logged in as <b>${user.email}</b>` : "Guest";
}

// ================= AUTH =================

async function signUp(){
  await client.auth.signUp({
    email: email.value,
    password: password.value
  });
  alert("Check email");
}

async function signIn(){
  await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  updateUserUI();
  loadFeed();
}

async function logout(){
  await client.auth.signOut();
  updateUserUI();
  loadFeed();
}

// ================= POLLS =================

async function addPoll(){

  const user = await getUser();
  if(!user) return alert("Login required");

  await client.from("polls").insert([{
    question: question.value,
    upvotes: 0,
    downvotes: 0,
    user_email: user.email
  }]);

  question.value = "";
  loadFeed();
}

async function loadFeed(){

  const { data } = await client
    .from("polls")
    .select("*")
    .order("id",{ascending:false});

  render(data || []);
}

// ================= RENDER =================

function render(items){

  feed.innerHTML = "";

  items.forEach(p=>{

    feed.innerHTML += `
      <div class="bg-white p-5 rounded-2xl shadow border">

        <div class="text-lg font-semibold mb-1">${p.question}</div>
        <div class="text-xs text-gray-400 mb-3">by ${p.user_email}</div>

        <div class="flex gap-2 mb-3">

          <button onclick="vote(${p.id},'up')"
            class="bg-green-500 hover:bg-green-600 text-white px-4 py-1 rounded-full text-sm">
            👍 ${p.upvotes}
          </button>

          <button onclick="vote(${p.id},'down')"
            class="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded-full text-sm">
            👎 ${p.downvotes}
          </button>

        </div>

        <button onclick="toggleComments(${p.id})"
          class="text-blue-600 text-sm hover:text-blue-800">
          💬 Comments
        </button>

        <div id="comments-${p.id}" class="hidden mt-3">

          <input id="input-${p.id}"
            class="w-full p-2 border rounded-lg mb-2"
            placeholder="Write comment..." />

          <button onclick="addComment(${p.id})"
            class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">
            Send
          </button>

          <div id="list-${p.id}" class="mt-3 space-y-2"></div>

        </div>

      </div>
    `;
  });
}

// ================= VOTES =================

async function vote(id,type){

  const user = await getUser();
  if(!user) return alert("Login required");

  const check = await client
    .from("votes")
    .select("*")
    .eq("poll_id",id)
    .eq("user_email",user.email);

  if(check.data.length > 0){
    alert("Already voted");
    return;
  }

  await client.from("votes").insert([{
    poll_id:id,
    user_email:user.email
  }]);

  const { data:poll } = await client
    .from("polls")
    .select("*")
    .eq("id",id)
    .single();

  const update = type==="up"
    ? {upvotes:poll.upvotes+1}
    : {downvotes:poll.downvotes+1};

  await client.from("polls").update(update).eq("id",id);

  // notification
  await client.from("notifications").insert([{
    user_email: poll.user_email,
    message: `${user.email} voted on your poll`
  }]);

  loadFeed();
}

// ================= COMMENTS =================

function toggleComments(id){

  const box = document.getElementById(`comments-${id}`);

  if(box.classList.contains("hidden")){
    box.classList.remove("hidden");
    loadComments(id);
  } else {
    box.classList.add("hidden");
  }
}

async function addComment(pollId){

  const user = await getUser();
  if(!user) return alert("Login required");

  const input = document.getElementById(`input-${pollId}`);
  if(!input.value) return;

  await client.from("comments").insert([{
    poll_id: pollId,
    user_email: user.email,
    content: input.value
  }]);

  // notification
  const owner = await client
    .from("polls")
    .select("user_email")
    .eq("id",pollId)
    .single();

  await client.from("notifications").insert([{
    user_email: owner.data.user_email,
    message: `${user.email} commented on your poll`
  }]);

  input.value = "";
  loadComments(pollId);
}

async function loadComments(pollId){

  const { data } = await client
    .from("comments")
    .select("*")
    .eq("poll_id",pollId)
    .order("id",{ascending:false});

  const list = document.getElementById(`list-${pollId}`);
  list.innerHTML = "";

  data.forEach(c=>{
    list.innerHTML += `
      <div class="bg-gray-100 p-2 rounded-lg text-sm">
        <b>${c.user_email}</b>: ${c.content}
      </div>
    `;
  });
}

// ================= PROFILE =================

async function loadProfile(){

  const user = await getUser();
  if(!user) return alert("Login required");

  const { data: polls } = await client
    .from("polls")
    .select("*")
    .eq("user_email", user.email);

  const { data: votes } = await client
    .from("votes")
    .select("*")
    .eq("user_email", user.email);

  const profile = document.getElementById("profile");

  profile.classList.remove("hidden");

  profile.innerHTML = `
    <h2 class="text-xl font-bold mb-2">👤 Profile</h2>
    <p>Email: ${user.email}</p>
    <p>Posts: ${polls.length}</p>
    <p>Votes: ${votes.length}</p>

    <button onclick="profile.classList.add('hidden')"
      class="mt-3 bg-gray-200 px-3 py-1 rounded">
      Close
    </button>
  `;
}

// ================= NOTIFICATIONS =================

async function loadNotifications(){

  const user = await getUser();
  if(!user) return alert("Login required");

  const { data } = await client
    .from("notifications")
    .select("*")
    .eq("user_email", user.email)
    .order("id",{ascending:false});

  if(!data.length){
    alert("No notifications");
    return;
  }

  alert(data.map(n=>"🔔 "+n.message).join("\n"));
}

// ================= START =================

const feed = document.getElementById("feed");

updateUserUI();
loadFeed();

</script>

</body>
</html>
