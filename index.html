<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votarox</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">

  <h1 class="text-2xl font-bold mb-4">Votarox</h1>

  <!-- USER INFO -->
  <div id="userBox" class="mb-4 text-sm text-gray-600"></div>

  <!-- AUTH -->
  <input id="email" class="w-full p-2 border mb-2" placeholder="Email">
  <input id="password" type="password" class="w-full p-2 border mb-2" placeholder="Password">

  <button onclick="signUp()" class="w-full bg-green-500 text-white p-2 mb-2">
    Sign Up
  </button>

  <button onclick="signIn()" class="w-full bg-blue-500 text-white p-2 mb-2">
    Sign In
  </button>

  <button onclick="logout()" class="w-full bg-red-500 text-white p-2 mb-4">
    Logout
  </button>

  <!-- POLL INPUT -->
  <input id="question" class="w-full p-2 border mb-2" placeholder="Ask a question">

  <button onclick="addPoll()" class="w-full bg-purple-500 text-white p-2 mb-4">
    Post Poll
  </button>

  <div id="polls" class="space-y-4"></div>

</div>

<script>

// ================= SUPABASE =================

const supabaseUrl = "https://kxpbgybstgmkmrlgzvpr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cGJneWJzdGdta21ybGd6dnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjI4NTIsImV4cCI6MjA5NDUzODg1Mn0.tPQN5mNV4dZXi2rOZsjdg4M-w4e_3epW2Hl_RrhN9zE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= UI USER =================

async function updateUserUI() {
  const { data } = await client.auth.getUser();
  const user = data.user;

  const box = document.getElementById("userBox");

  if (user) {
    box.innerHTML = `Logged in as: <b>${user.email}</b>`;
  } else {
    box.innerHTML = "Not logged in";
  }
}

// ================= AUTH =================

async function signUp() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({
    email,
    password
  });

  if (error) alert(error.message);
  else alert("Check your email!");
}

async function signIn() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) alert(error.message);
  else {
    alert("Logged in ✔");
    updateUserUI();
    loadPolls();
  }
}

async function logout() {
  await client.auth.signOut();
  updateUserUI();
  loadPolls();
}

// ================= POLLS =================

async function addPoll() {

  const input = document.getElementById("question");
  const q = input.value.trim();

  if (!q) return;

  const { error } = await client
    .from("polls")
    .insert([{ question: q, upvotes: 0, downvotes: 0 }]);

  if (error) alert(error.message);
  else {
    input.value = "";
    loadPolls();
  }
}

async function loadPolls() {

  const { data } = await client
    .from("polls")
    .select("*")
    .order("id", { ascending: false });

  render(data || []);
}

function render(polls) {

  const container = document.getElementById("polls");
  container.innerHTML = "";

  polls.forEach(p => {

    container.innerHTML += `
      <div class="border p-4 rounded">

        <p class="font-bold mb-2">${p.question}</p>

        <button onclick="vote(${p.id}, 'up')" class="bg-green-500 text-white px-3 py-1 rounded">
          👍 ${p.upvotes}
        </button>

        <button onclick="vote(${p.id}, 'down')" class="bg-red-500 text-white px-3 py-1 rounded ml-2">
          👎 ${p.downvotes}
        </button>

      </div>
    `;
  });
}

// ================= VOTE =================

async function vote(id, type) {

  const { data } = await client.auth.getUser();
  const user = data.user;

  if (!user) {
    alert("Please login first");
    return;
  }

  const { data: existing } = await client
    .from("votes")
    .select("*")
    .eq("poll_id", id)
    .eq("user_email", user.email);

  if (existing.length > 0) {
    alert("You already voted!");
    return;
  }

  await client.from("votes").insert([
    {
      poll_id: id,
      user_email: user.email
    }
  ]);

  const { data: poll } = await client
    .from("polls")
    .select("*")
    .eq("id", id)
    .single();

  const updates = type === "up"
    ? { upvotes: poll.upvotes + 1 }
    : { downvotes: poll.downvotes + 1 };

  await client
    .from("polls")
    .update(updates)
    .eq("id", id);

  loadPolls();
}

// ================= AUTO START =================

updateUserUI();
loadPolls();

</script>

</body>
</html>
